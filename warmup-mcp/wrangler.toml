name = "warmup-mcp"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Bundle the skill markdown and HTML template files as text imports.
[[rules]]
type = "Text"
globs = ["**/*.md", "**/*.html"]
fallthrough = true

# Durable Objects — required by the agents/mcp McpAgent class for SSE state.
[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "WarmupMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WarmupMCP"]

# KV namespace for OAuth state (client registrations, auth codes, tokens).
# Created via: npx wrangler kv namespace create OAUTH_KV
# After creation, paste the returned id below.
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "166485bbda2e45c3bd9f83c4eff2a3e2"

# Observability — optional but useful. Free tier includes this.
[observability]
enabled = true

# Custom domain binding. Cloudflare auto-provisions DNS and SSL when the
# zone (missionbuilt.io) is managed in the same Cloudflare account.
#
# Naming convention for The Loadout MCP servers: <skill>-mcp.missionbuilt.io
# Single-level subdomain keeps us inside free Universal SSL coverage.
[[routes]]
pattern = "warmup-mcp.missionbuilt.io"
custom_domain = true

# Secrets — set via `npx wrangler secret put <NAME>`:
#   GOOGLE_CLIENT_ID       — from Google Cloud Console OAuth client
#   GOOGLE_CLIENT_SECRET   — from Google Cloud Console OAuth client
#   COOKIE_ENCRYPTION_KEY  — random 32-byte hex string
