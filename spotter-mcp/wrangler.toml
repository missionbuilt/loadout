name = "spotter-mcp"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Bundle the skill markdown files as text imports.
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

# Durable Objects — required by the agents/mcp McpAgent class for SSE state.
[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "SpotterMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SpotterMCP"]

# KV namespace for OAuth state (client registrations, auth codes, tokens).
# Created via: npx wrangler kv namespace create OAUTH_KV
# After creation, paste the returned id below.
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "14c988ccfccd4c74a74be0fccd81105e"

# Observability — optional but useful. Free tier includes this.
[observability]
enabled = true

# Custom domain binding. Cloudflare auto-provisions DNS and SSL when the
# zone (missionbuilt.io) is managed in the same Cloudflare account that
# deploys this Worker.
#
# Naming convention for The Loadout MCP servers: <skill>-mcp.missionbuilt.io
# Single-level subdomain keeps us inside free Universal SSL coverage while
# the -mcp suffix marks these as Model Context Protocol endpoints, leaving
# bare subdomains (spotter.missionbuilt.io) free for non-MCP uses later.
[[routes]]
pattern = "spotter-mcp.missionbuilt.io"
custom_domain = true

# Secrets — set via `npx wrangler secret put <NAME>`:
#   GOOGLE_CLIENT_ID       — from Google Cloud Console OAuth client
#   GOOGLE_CLIENT_SECRET   — from Google Cloud Console OAuth client
#   COOKIE_ENCRYPTION_KEY  — random 32-char string for cookie signing
