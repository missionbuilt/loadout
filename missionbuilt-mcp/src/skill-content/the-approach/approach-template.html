<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title id="page-title">The Approach · Pre-Call Brief</title>
<!-- Google Fonts: fallback for non-Cowork contexts (local HTML, exports). Silently blocked by Cowork CSP; MCP font loader takes over inside Cowork. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ══════════════════════════════════════════════════════════════════════
     THE APPROACH · BRIEFING  (C1 · clarity-forward · editorial single-column)
     Data-driven via window.APPROACH_DATA injection.
     ══════════════════════════════════════════════════════════════════════ */
  :root {
    color-scheme: light;
    --paper:        #f3ecdc;
    --paper-warm:   #ebe2cf;
    --paper-card:   #ede5d2;
    --paper-soft:   #efe8d6;
    --ink:          #1a1612;
    --ink-soft:     #3a342d;
    --ink-dim:      #3d332a;
    --ink-faint:    #52473a;
    --rule:         #c8bea7;
    --rule-soft:    #d8cfb8;
    --blood:        #8a2017;
    --blood-bright: #a8281e;
    --army:         #5f6e26;
    --army-soft:    #dfe3c4;

    --font-display: 'Oswald', sans-serif;
    --font-serif:   'Merriweather', Georgia, serif;
    --font-mono:    'JetBrains Mono', 'Courier New', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0; box-shadow: none !important; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-serif);
    font-size: 17.5px;
    line-height: 1.78;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  ::selection { background: rgba(138,32,23,0.18); }
  a { color: inherit; text-decoration: none; }

  /* ── TOOLBAR ────────────────────────────────────────────────────────── */
  .toolbar-bar {
    max-width: 760px;
    margin: 0 auto;
    padding: 14px 32px 0;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 6px;
  }
  .masthead-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .tb-btn { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); background: transparent; border: 1px solid var(--rule); padding: 4px 11px; line-height: 1; cursor: pointer; transition: color 0.1s, border-color 0.1s, background 0.1s; white-space: nowrap; }
  .tb-btn:hover { color: var(--ink); background: var(--paper-warm); }
  .tb-btn.save { color: var(--blood); }
  .tb-btn.save:hover { color: var(--paper); background: var(--blood); border-color: var(--blood); }
  .tb-export { position: relative; display: flex; align-items: center; }
  .tb-dropdown { display: none; position: absolute; top: 100%; right: 0; background: var(--paper); border: 1px solid var(--rule); border-top: none; z-index: 300; min-width: 160px; }
  .tb-dropdown.open { display: block; }
  .tb-dropdown button { display: block; width: 100%; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); background: transparent; border: none; border-bottom: 1px solid var(--rule); padding: 10px 16px; text-align: left; cursor: pointer; white-space: nowrap; transition: color 0.1s, background 0.1s; }
  .tb-dropdown button:last-child { border-bottom: none; }
  .tb-dropdown button:hover { color: var(--ink); background: var(--paper-warm); }
  .tb-dropdown button.dd-primary { color: var(--blood); }
  .tb-dropdown button.dd-primary:hover { color: var(--paper); background: var(--blood); }
  @media print { .toolbar-bar { display: none !important; } }

  /* ── MASTHEAD ───────────────────────────────────────────────────────── */
  .head {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 32px 36px;
    border-bottom: 1px solid var(--rule);
  }
  .head .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--blood); font-weight: 500;
    margin-bottom: 24px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .head .eyebrow .sep { color: var(--ink-faint); }
  .head h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 72px;
    letter-spacing: -0.01em;
    line-height: 0.96;
    color: var(--ink);
    margin-bottom: 20px;
  }
  .head .deck {
    font-family: var(--font-serif);
    font-style: italic; font-weight: 400;
    font-size: 22px;
    line-height: 1.5;
    color: var(--ink);
    max-width: 60ch;
    text-wrap: pretty;
  }
  .head .meta {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--rule-soft);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .head .meta .k {
    font-size: 9.5px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-dim); font-weight: 500;
    margin-bottom: 4px; display: block;
  }
  .head .meta .v { color: var(--ink); font-weight: 500; }

  /* ── TABLE OF CONTENTS ──────────────────────────────────────────────── */
  .toc {
    max-width: 760px; margin: 0 auto;
    padding: 28px 32px 32px;
    border-bottom: 1px solid var(--rule);
  }
  .toc .label {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--ink-faint); font-weight: 500;
    margin-bottom: 18px;
  }
  .toc ol { list-style: none; counter-reset: toc; columns: 2; column-gap: 32px; }
  .toc li {
    counter-increment: toc;
    padding: 8px 0;
    font-family: var(--font-display);
    font-size: 18px; font-weight: 500;
    color: var(--ink-soft);
    display: flex; gap: 14px; align-items: baseline;
    break-inside: avoid;
  }
  .toc li::before {
    content: counter(toc, decimal-leading-zero);
    font-family: var(--font-mono); font-size: 11px;
    color: var(--blood); font-weight: 500;
    letter-spacing: 0.1em;
    flex-shrink: 0;
  }
  .toc li a { color: inherit; border-bottom: 1px solid transparent; }
  .toc li a:hover { border-bottom-color: var(--ink); }

  /* ── MEDDPICC SCORECARD ─────────────────────────────────────────────── */
  .meddpicc {
    max-width: 760px; margin: 0 auto;
    padding: 48px 32px 36px;
    border-bottom: 1px solid var(--rule);
  }
  .meddpicc .kicker {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--blood); font-weight: 500;
    margin-bottom: 8px; display: block;
  }
  .meddpicc h2 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 36px;
    letter-spacing: -0.01em;
    line-height: 1.05;
    color: var(--ink);
    margin: 6px 0 6px;
  }
  .meddpicc .deck {
    font-family: var(--font-serif);
    font-style: italic; font-weight: 300;
    color: var(--ink-soft);
    font-size: 16px;
    max-width: 60ch;
    margin-bottom: 18px;
  }
  .meddpicc .ring {
    display: flex; gap: 22px; flex-wrap: wrap;
    padding: 12px 0;
    border-top: 1px solid var(--rule-soft);
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 22px;
    align-items: center;
  }
  .meddpicc .ring .leg {
    font-family: var(--font-mono);
    font-size: 10.5px; letter-spacing: 0.16em;
    color: var(--ink-dim);
    display: flex; align-items: center; gap: 8px;
  }
  .meddpicc .ring .leg .pip {
    display: inline-block; width: 11px; height: 11px;
    border: 1.5px solid var(--ink-faint);
    flex-shrink: 0;
  }
  .meddpicc .ring .leg.confirmed .pip { background: var(--army); border-color: var(--army); }
  .meddpicc .ring .leg.partial .pip {
    background: linear-gradient(to right, #946011 50%, transparent 50%);
    border-color: #946011;
  }
  .meddpicc .ring .leg.unknown .pip { background: transparent; border-color: var(--ink-faint); }
  .meddpicc .ring .score {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-dim);
  }
  .meddpicc .ring .score b {
    color: var(--ink); font-weight: 700;
    font-family: var(--font-display); font-size: 16px;
    letter-spacing: 0.02em;
    margin: 0 4px;
  }
  .meddpicc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border-top: 1px solid var(--rule);
    border-left: 1px solid var(--rule);
  }
  .mp {
    padding: 18px 20px 16px;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    background: var(--paper-soft);
    display: grid;
    grid-template-columns: 36px 1fr auto;
    gap: 14px;
    align-items: start;
  }
  .mp .letter {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 30px;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .mp .body .k {
    font-family: var(--font-mono);
    font-size: 9.5px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--ink-faint); font-weight: 500;
    display: block;
    margin-bottom: 2px;
  }
  .mp .body h3 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 17px;
    line-height: 1.2;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .mp .body .ev {
    font-family: var(--font-serif);
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink-soft);
    margin-bottom: 6px;
    text-wrap: pretty;
  }
  .mp .body .next {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.02em;
    color: var(--blood);
    display: block;
    line-height: 1.4;
  }
  .mp .body .next::before { content: '▸ '; }
  .mp .pip {
    display: inline-block;
    width: 14px; height: 14px;
    border: 1.5px solid var(--ink-faint);
    margin-top: 5px;
    flex-shrink: 0;
  }
  .mp.confirmed { background: #e6e6d0; }
  .mp.confirmed .pip { background: var(--army); border-color: var(--army); }
  .mp.partial .pip {
    background: linear-gradient(to right, #c8881a 50%, transparent 50%);
    border-color: #c8881a;
  }
  .mp.unknown { background: var(--paper-card); }
  .mp.unknown .pip { background: transparent; border-color: var(--ink-faint); }
  .mp.unknown .body h3 { color: var(--ink-dim); }

  /* ── INLINE MEDDPICC CHIP ───────────────────────────────────────────── */
  .mp-chip {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--blood);
    border: 1px solid var(--blood);
    padding: 2px 7px;
    margin-right: 8px;
    vertical-align: 2px;
    font-weight: 600;
    background: var(--paper-card);
  }
  .mp-chip.confirmed { color: var(--army); border-color: var(--army); background: var(--army-soft); }
  .mp-chip.partial { color: #946011; border-color: #946011; background: #f0dfba; }
  .mp-chip.unknown { color: var(--ink-dim); border-color: var(--ink-faint); background: var(--paper-soft); }

  /* ── MAIN ───────────────────────────────────────────────────────────── */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }

  /* ── SECTION ────────────────────────────────────────────────────────── */
  section.sec { padding-top: 64px; }
  .sec-num {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--blood); font-weight: 500;
    margin-bottom: 8px;
    display: flex; gap: 12px; align-items: baseline;
  }
  .sec-num .pipe { color: var(--ink-faint); }
  .sec-num .for {
    font-family: var(--font-serif); font-style: italic; font-weight: 300;
    text-transform: none; letter-spacing: 0.01em;
    color: var(--ink-dim); font-size: 13px;
  }
  .sec-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 36px;
    letter-spacing: -0.01em;
    line-height: 1.08;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .sec-subtitle {
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: 20px;
    line-height: 1.45;
    color: var(--ink-soft);
    margin-bottom: 16px;
    max-width: 58ch;
    text-wrap: pretty;
  }
  .sec-deck {
    font-family: var(--font-serif);
    font-style: italic; font-weight: 400;
    font-size: 19px;
    line-height: 1.55;
    color: var(--ink-soft);
    margin-bottom: 36px;
    max-width: 58ch;
    text-wrap: pretty;
  }

  /* ── TL;DR CARD ─────────────────────────────────────────────────────── */
  .tldr {
    margin: 0 0 40px;
    padding: 22px 26px;
    background: var(--paper-card);
    border-left: 3px solid var(--ink);
  }
  .tldr .k {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--ink); font-weight: 600;
    margin-bottom: 8px;
  }
  .tldr p {
    font-family: var(--font-serif);
    font-size: 17px;
    line-height: 1.6;
    color: var(--ink);
    text-wrap: pretty;
    max-width: 62ch;
  }
  .tldr p + p { margin-top: 8px; }

  /* ── BODY PROSE ─────────────────────────────────────────────────────── */
  .prose p {
    font-size: 17.5px;
    line-height: 1.78;
    color: var(--ink);
    margin-bottom: 22px;
    text-wrap: pretty;
    max-width: 68ch;
  }
  .prose p strong { font-weight: 700; color: var(--ink); }
  .prose p em { font-style: italic; }
  .prose .source {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.04em;
    color: var(--ink-faint);
    margin: -16px 0 22px;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .prose .source .dot {
    width: 7px; height: 7px; display: inline-block;
    background: var(--army); flex-shrink: 0;
  }
  .prose .source .dot.company { background: var(--blood); }
  .prose .source .dot.press { background: var(--ink); }
  .prose .source .dot.social { background: var(--ink-faint); }
  .prose .source .sep { color: var(--rule); }

  /* ── PULL QUOTE ─────────────────────────────────────────────────────── */
  .pull {
    margin: 40px 0;
    padding: 8px 0 8px 28px;
    border-left: 4px solid var(--blood);
  }
  .pull q {
    quotes: none;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 28px;
    line-height: 1.18;
    letter-spacing: -0.005em;
    color: var(--ink);
    display: block;
    margin-bottom: 12px;
    text-wrap: balance;
  }
  .pull cite {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.1em;
    color: var(--ink-dim);
    font-style: normal;
    display: block;
  }

  /* ── FACT STRIP ─────────────────────────────────────────────────────── */
  .facts {
    margin: 32px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    padding: 20px 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .facts .f { padding-right: 18px; border-right: 1px solid var(--rule-soft); }
  .facts .f:last-child { border-right: none; }
  .facts .f .k {
    font-family: var(--font-mono);
    font-size: 9.5px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-faint); font-weight: 500;
    margin-bottom: 6px; display: block;
  }
  .facts .f .v {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 500;
    color: var(--ink); line-height: 1.15;
    display: block; margin-bottom: 4px;
  }
  .facts .f .note {
    font-family: var(--font-serif);
    font-size: 13.5px; color: var(--ink-soft);
    font-style: italic; line-height: 1.4;
  }

  /* ── ACTION FOOTER ──────────────────────────────────────────────────── */
  .action {
    margin: 32px 0 0;
    padding: 18px 22px;
    background: var(--army-soft);
    border-left: 3px solid var(--army);
  }
  .action .k {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--army); font-weight: 600;
    margin-bottom: 6px;
  }
  .action p {
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 1.55;
    color: var(--ink);
    max-width: 64ch;
  }

  /* ── ACT DIVIDER ────────────────────────────────────────────────────── */
  .act-divider {
    margin: 80px 0 0;
    padding: 28px 0;
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    text-align: center;
  }
  .act-divider .k {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.34em; text-transform: uppercase;
    color: var(--ink-faint); font-weight: 500;
    margin-bottom: 8px;
  }
  .act-divider h2 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 36px;
    letter-spacing: -0.005em;
    line-height: 1;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .act-divider .deck {
    font-family: var(--font-serif);
    font-style: italic; font-weight: 300;
    color: var(--ink-soft); font-size: 16px;
  }

  /* ── STACK TABLE ────────────────────────────────────────────────────── */
  .stack-table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0 8px;
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .stack-table th {
    text-align: left;
    font-size: 9.5px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-faint); font-weight: 500;
    padding: 0 16px 10px 0;
    border-bottom: 1px solid var(--rule);
  }
  .stack-table td {
    padding: 12px 16px 12px 0;
    border-bottom: 1px solid var(--rule-soft);
    vertical-align: top;
  }
  .stack-table td.layer { color: var(--ink-faint); width: 18%; }
  .stack-table td.tool { color: var(--ink); font-weight: 500; width: 22%; }
  .stack-table td.status { width: 14%; font-size: 10px; letter-spacing: 0.16em; color: var(--army); font-weight: 600; }
  .stack-table td.status.unk { color: var(--ink-faint); }
  .stack-table td.status.gap { color: var(--blood); }
  .stack-table td.note { font-family: var(--font-serif); font-size: 14.5px; color: var(--ink-soft); line-height: 1.55; }

  /* ── DISCOVERY QUESTIONS ────────────────────────────────────────────── */
  .questions {
    margin: 24px 0 0;
    list-style: none;
    counter-reset: q;
  }
  .questions li {
    counter-increment: q;
    padding: 14px 0 14px 52px;
    position: relative;
    border-bottom: 1px solid var(--rule-soft);
    font-family: var(--font-serif);
    font-size: 16.5px;
    line-height: 1.55;
    color: var(--ink);
    max-width: 64ch;
  }
  .questions li::before {
    content: "Q" counter(q);
    position: absolute; left: 0; top: 14px;
    font-family: var(--font-mono);
    font-size: 10.5px; letter-spacing: 0.16em;
    color: var(--blood); font-weight: 600;
  }

  /* ── OPENER SCRIPT ──────────────────────────────────────────────────── */
  .opener {
    margin-top: 36px;
    padding: 28px 32px;
    background: var(--paper-warm);
    border: 1px solid var(--rule);
  }
  .opener .k {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--ink-faint); font-weight: 500;
    margin-bottom: 14px;
  }
  .opener q {
    quotes: none;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 19px;
    line-height: 1.65;
    color: var(--ink);
    display: block;
    text-wrap: pretty;
    max-width: 66ch;
  }
  .opener .beat {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--rule-soft);
  }

  /* ── COLOPHON ───────────────────────────────────────────────────────── */
  .colophon {
    max-width: 760px;
    margin: 56px auto 36px;
    padding: 22px 32px;
    border-top: 3px double var(--ink);
    border-bottom: 1px solid var(--rule);
    text-align: center;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
    line-height: 1.8;
  }
  .colophon .f-sq {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--blood);
    margin: 0 6px;
    vertical-align: 1px;

    .toolbar-bar { padding-left: 20px; padding-right: 20px; }

</style>

<!-- ═══════════════════════════════════════════════════════════════════════
     DATA INJECTION POINT — replaced at render time by The Approach skill
     ═══════════════════════════════════════════════════════════════════════ -->
<script id="approach-data">
try {
  window.APPROACH_DATA = __APPROACH_DATA__;
} catch(e) {
  window.APPROACH_DATA = null;
}
</script>

<script>
/* ── Font loader — lazy-loads fonts via MCP tool, caches in localStorage ─── *
 *  Cowork's CSP blocks external font CDNs (Google Fonts, jsDelivr, etc).    *
 *  Fonts are served by the Loadout MCP server via warmup_get_fonts instead.  *
 *  Same four font families as The Warmup and The Spotter — shares the same   *
 *  localStorage cache key so any skill's load covers the others.             *
 *  fontToolName is written into APPROACH_DATA.config by the agent.           *
 * ─────────────────────────────────────────────────────────────────────────── */
(function loadFonts() {
  var FONT_CACHE_KEY = 'warmup-fonts-v2'; // shared with warmup + spotter
  var cfg      = (window.APPROACH_DATA && window.APPROACH_DATA.config) || {};
  var toolName = cfg.fontToolName || '';

  function showFontError(stage, detail) {
    try {
      if (document.getElementById('approach-font-err')) return;
      var b = document.createElement('div');
      b.id = 'approach-font-err';
      b.style.cssText = 'position:fixed;bottom:8px;right:8px;z-index:99999;max-width:520px;'
        + 'background:#fff8f8;color:#900;border:1px solid #c00;'
        + 'font:11px/1.4 ui-monospace,Menlo,Consolas,monospace;padding:8px 10px;';
      b.textContent = '[Approach:Fonts] ' + stage + ' — ' + (detail || 'see console');
      (document.body || document.documentElement).appendChild(b);
    } catch(_) {}
  }

  // Fonts already present in DOM — another skill loaded them first, or this is an exported file.
  if (document.getElementById('warmup-fonts')) return;

  function injectCSS(css) {
    if (document.getElementById('warmup-fonts')) return;
    var s = document.createElement('style');
    s.id          = 'warmup-fonts'; // shared id — consistent across all skills
    s.textContent = css;
    document.head.insertBefore(s, document.head.firstChild);
  }

  // Try localStorage cache first — only trust entries with real @font-face rules.
  try {
    var cached = localStorage.getItem(FONT_CACHE_KEY);
    if (cached && cached.length > 100 && cached.indexOf('@font-face') > -1) { injectCSS(cached); return; }
    if (cached) { try { localStorage.removeItem(FONT_CACHE_KEY); } catch(e){} }
  } catch(e) { /* storage unavailable */ }

  var _fontAttempts = 0;
  function tryFetchFonts() {
    if (!window.cowork || typeof window.cowork.callMcpTool !== 'function') {
      if (++_fontAttempts < 25) { setTimeout(tryFetchFonts, 200); return; }
      // Not inside a Cowork artifact — fall back to system fonts silently.
      console.warn('[Approach:Fonts] window.cowork not available — falling back to system fonts.');
      return;
    }
    // We are inside Cowork. Now toolName must be set — if not, that is an agent config error.
    if (!toolName) { showFontError('no fontToolName in APPROACH_DATA.config', 'agent must set config.fontToolName'); return; }
    // Sanitize toolName before use — defense-in-depth against malformed config values.
    var safeToolName = toolName.replace(/[^A-Za-z0-9_\-:]/g, '').slice(0, 200);
    if (!safeToolName) { showFontError('invalid fontToolName', toolName.slice(0, 40)); return; }
    window.cowork.callMcpTool(safeToolName, { intent: 'Loading approach fonts' })
      .then(function(raw) {
        try {
          var css = null;
          function tryParseCss(val) {
            if (!val) return null;
            if (typeof val === 'string') {
              if (val.trim().charAt(0) === '{') {
                try { var p = JSON.parse(val); return (p && p.css) ? p.css : val; } catch(e) {}
              }
              return val;
            }
            if (val && val.css) return val.css;
            return null;
          }
          if (typeof raw === 'string')                                    { css = tryParseCss(raw); }
          else if (raw && raw.css)                                        { css = raw.css; }
          else if (Array.isArray(raw) && raw[0] && raw[0].text)          { css = tryParseCss(raw[0].text); }
          else if (raw && raw.content && Array.isArray(raw.content))     { var item = raw.content[0]; css = item ? tryParseCss(item.text) : null; }
          if (!css || css.length < 100 || css.indexOf('@font-face') === -1) {
            var shape; try { shape = JSON.stringify(raw).slice(0, 200); } catch(_) { shape = String(raw).slice(0, 200); }
            showFontError('unexpected font response', shape); return;
          }
          injectCSS(css);
          try { localStorage.setItem(FONT_CACHE_KEY, css); } catch(e) { console.warn('[Approach:Fonts] localStorage write failed', e); }
        } catch(e) {
          showFontError('parse error', String(e && e.message || e));
        }
      })
      .catch(function(err) {
        showFontError('MCP call rejected', String(err && err.message || err));
      });
  }
  tryFetchFonts();
})();
</script>

<!-- ── TOOLBAR ──────────────────────────────────────────────────────────── -->
<div class="toolbar-bar">
  <div class="masthead-controls">
    <div class="tb-export">
      <button class="tb-btn save" onclick="toggleExport(event)">Export ▾</button>
      <div class="tb-dropdown" id="export-dd">

<!-- ── MASTHEAD ─────────────────────────────────────────────────────────── -->
<header class="head">

  <div id="col-text"><a href="https://missionbuilt.io" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">Mission<span class="f-sq"></span>Built</a> <span class="f-sq"></span> The Approach <span class="f-sq"></span> The Loadout</div>
  <div class="col-sub" id="col-sub"></div>

<!-- ── RENDERER ─────────────────────────────────────────────────────────── -->
<script>
try {

var C = window.APPROACH_DATA || {};
var M = C.meta || {};

/* ── helpers ── */
function $(id) { return document.getElementById(id); }

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function safeUrl(u) {
  if (!u) return '';
  var s = String(u).trim();
  return /^https?:\/\//i.test(s) ? s : '';
}

/* rich(text) — escapes HTML then applies:
 *   **text** → <strong>
 *   _text_   → <em>
 *   {chip:confirmed|partial|unknown:label} → .mp-chip span
 */
function rich(text) {
  var s = esc(text);
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/_([^_]+)_/g, '<em>$1</em>');
  s = s.replace(/\{chip:(confirmed|partial|unknown):([^}]+)\}/g, function(_, status, label) {
    return '<span class="mp-chip ' + status + '">' + label + '</span>';
  });
  return s;
}

/* ── masthead ── */
function renderMasthead() {
  // Eyebrow
  var parts = ['The Approach'];
  if (M.briefNumber) parts.push('Pre-call brief ' + esc(M.briefNumber));
  if (M.callDate)    parts.push(esc(M.callDate));
  var eyeHtml = parts.map(function(p, i) {
    return i === 0 ? p : '<span class="sep">·</span>' + p;
  }).join(' ');
  $('h-eyebrow').innerHTML = eyeHtml;

  // H1 — company name with trailing period
  var company = esc(M.company || 'Brief');
  $('h-title').textContent = (M.company || 'Brief') + '.';

  // Deck
  $('h-deck').innerHTML = rich(M.deck || '');

  // Meta
  var cfg = C.config || {};
  var forStr = esc(cfg.seller || '');
  if (cfg.se) forStr += ' + ' + esc(cfg.se);
  $('h-meta-for').innerHTML     = forStr || '—';
  $('h-meta-sources').textContent = M.sourceCount || '—';
  $('h-meta-gen').textContent   = M.generated   || '—';
  $('h-meta-read').textContent  = M.readingTime || '—';

  // Page title
  document.title = 'The Approach · ' + (M.company || 'Brief');
}

/* ── TOC ── */
function renderTOC() {
  var sections = C.sections || [];
  var items = sections.map(function(s) {
    var label = esc(s.kicker || (s.title || '').replace(/\.$/, ''));
    return '<li><a href="#' + esc(s.id) + '">' + label + '</a></li>';
  });
  if (C.meddpicc) {
    items.push('<li><a href="#meddpicc">Qualification (MEDDPICC)</a></li>');
  }
  $('toc-list').innerHTML = items.join('');
}

/* ── MEDDPICC scorecard ── */
function renderMeddpicc() {
  if (!C.meddpicc) return;
  var m = C.meddpicc;
  var cells = Array.isArray(m.cells) ? m.cells : [];

  // Show the section
  $('meddpicc').style.display = '';

  // Deck
  if (m.deck) $('medd-deck').innerHTML = rich(m.deck);
  if (m.title) $('medd-title').textContent = m.title;

  // Score counts
  var conf = cells.filter(function(c) { return c.status === 'confirmed'; }).length;
  var part = cells.filter(function(c) { return c.status === 'partial'; }).length;
  var unk  = cells.filter(function(c) { return c.status === 'unknown'; }).length;
  $('medd-score').innerHTML = 'Score <b>' + conf + ' / ' + part + ' / ' + unk + '</b> · pre-call';

  // Grid
  var grid = cells.map(function(cell) {
    var st = esc(cell.status || 'unknown');
    return '<div class="mp ' + st + '">'
      + '<span class="letter">' + esc(cell.letter || '') + '</span>'
      + '<div class="body">'
      + '<span class="k">'  + esc(cell.label    || '') + '</span>'
      + '<h3>'              + esc(cell.headline || '') + '</h3>'
      + '<p class="ev">'   + esc(cell.evidence || '') + '</p>'
      + '<span class="next">' + esc(cell.next   || '') + '</span>'
      + '</div>'
      + '<span class="pip"></span>'
      + '</div>';
  }).join('');
  $('medd-grid').innerHTML = grid;
}

/* ── prose item renderer ── */
function renderProseItem(item) {
  if (!item || !item.type) return '';
  switch (item.type) {

    case 'p': {
      var h = '<p>' + rich(item.text || '') + '</p>';
      if (item.source) {
        var tier = esc(item.source.tier || '');
        var dotCls = 'dot' + (tier ? ' ' + tier : '');
        h += '<p class="source"><span class="' + dotCls + '"></span>' + esc(item.source.text || '') + '</p>';
      }
      return h;
    }

    case 'pull': {
      var ph = '<div class="pull">'
        + '<q>' + rich(item.text || '') + '</q>';
      if (item.cite) ph += '<cite>' + esc(item.cite) + '</cite>';
      return ph + '</div>';
    }

    case 'facts': {
      var fs = (item.items || []).map(function(f) {
        return '<div class="f">'
          + '<span class="k">' + esc(f.k || '') + '</span>'
          + '<span class="v">' + esc(f.v || '') + '</span>'
          + '</div>';
      }).join('');
      return '<div class="facts">' + fs + '</div>';
    }

    case 'table': {
      var rows = (item.rows || []).map(function(r) {
        var stCls = 'status' + (r.statusClass ? ' ' + esc(r.statusClass) : '');
        return '<tr>'
          + '<td class="layer">' + esc(r.layer  || '') + '</td>'
          + '<td class="tool">'  + esc(r.tool   || '') + '</td>'
          + '<td class="' + stCls + '">' + esc(r.status || '') + '</td>'
          + '<td class="note">'  + esc(r.note   || '') + '</td>'
          + '</tr>';
      }).join('');
      return '<table class="stack-table">'
        + '<thead><tr><th>Layer</th><th>Tool</th><th>Fit</th><th>Notes</th></tr></thead>'
        + '<tbody>' + rows + '</tbody>'
        + '</table>';
    }

    case 'opener': {
      var beats = (item.beats || []).map(function(b) {
        return '<div class="beat">' + esc(b) + '</div>';
      }).join('');
      return '<div class="opener">'
        + '<div class="k">Suggested opener · ~90 seconds</div>'
        + '<q>' + esc(item.script || '') + '</q>'
        + beats
        + '</div>';
    }

    case 'questions': {
      var qs = (item.items || []).map(function(q) {
        var chipHtml = (q && q.chip && q.chip.text)
          ? '<span class="mp-chip ' + esc(q.chip.status || '') + '">' + esc(q.chip.text) + '</span>'
          : '';
        return '<li>' + chipHtml + esc(typeof q === 'string' ? q : (q.text || '')) + '</li>';
      }).join('');
      var label = item.label ? '<div class="k">' + esc(item.label) + '</div>' : '';
      return label + '<ol class="questions">' + qs + '</ol>';
    }

    default:
      return '';
  }
}

/* ── sections ── */
function renderSections() {
  var sections = C.sections || [];
  var ad = C.actDivider;
  var seenSE = false;
  var html = '';

  sections.forEach(function(s) {
    // Insert act divider before the first SE section
    if (ad && s.for === 'the SE' && !seenSE) {
      seenSE = true;
      html += '<div class="act-divider">'
        + '<div class="k">' + esc(ad.kicker || 'Handoff') + '</div>'
        + '<h2>' + esc(ad.title || 'Technical posture.') + '</h2>'
        + '<p class="deck">' + esc(ad.deck || '') + '</p>'
        + '</div>';
    }

    // Action kicker label
    var aLabel = s.for === 'the SE' ? 'For the SE' : 'For the call';

    html += '<section class="sec" id="' + esc(s.id) + '">';
    html += '<div class="sec-num"><span>' + esc(s.number || '') + '</span>'
          + '<span class="pipe">·</span>'
          + '<span class="for">for ' + esc(s.for || 'the AE') + '</span></div>';
    html += '<h2 class="sec-title">' + esc(s.kicker || s.title || '') + '</h2>';
    if (s.title) html += '<p class="sec-subtitle">' + esc(s.title) + '</p>';
    html += '<p class="sec-deck">' + rich(s.deck || '') + '</p>';

    // TL;DR card
    var tldrItems = Array.isArray(s.tldr) ? s.tldr : (s.tldr ? [s.tldr] : []);
    var tldrHtml = tldrItems.map(function(t) { return '<p>' + rich(t) + '</p>'; }).join('');
    html += '<div class="tldr"><div class="k">TL;DR</div>' + tldrHtml + '</div>';

    // Prose items
    var proseHtml = (s.prose || []).map(renderProseItem).join('');
    if (proseHtml) html += '<div class="prose">' + proseHtml + '</div>';

    // Action footer
    if (s.action) {
      html += '<div class="action"><div class="k">' + aLabel + '</div>'
            + '<p>' + rich(s.action) + '</p></div>';
    }

    html += '</section>';
  });

  $('main-content').innerHTML = html;
}

/* ── colophon ── */
function renderColophon() {
  var sub = [];
  var cfg = C.config || {};
  if (cfg.seller)  sub.push(esc(cfg.seller));
  if (cfg.se)      sub.push(esc(cfg.se));
  if (C.product)   sub.push(esc(C.product));
  if (M.generated) sub.push('Generated ' + esc(M.generated));
  var subEl = $('col-sub');
  if (subEl && sub.length) subEl.innerHTML = sub.join(' &nbsp;·&nbsp; ');
}

/* ── boot ── */
renderMasthead();
renderTOC();
renderSections();
renderMeddpicc();
renderColophon();

} catch(err) {
  document.body.insertAdjacentHTML('afterbegin',
    '<p style="position:fixed;top:0;left:0;right:0;padding:12px 16px;background:#b6271d;color:#fff;font-family:monospace;font-size:13px;z-index:9999">' +
    'The Approach render error — ' + String(err) + '</p>'
  );
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function toggleExport(e) { if (e) e.stopPropagation(); var dd = document.getElementById('export-dd'); if (dd) dd.classList.toggle('open'); }
function closeExport() { var dd = document.getElementById('export-dd'); if (dd) dd.classList.remove('open'); }
document.addEventListener('click', function(e) { if (!e.target.closest || !e.target.closest('.tb-export')) closeExport(); });
function exportHTML() {
  closeExport();
  var now = new Date();
  var C2 = window.APPROACH_DATA || {};
  var co = ((C2.meta && C2.meta.company) || '').replace(/[^a-z0-9]/gi, '').toLowerCase().slice(0, 12);
  var isoFmt = new Intl.DateTimeFormat('en-CA', { year: 'numeric', month: '2-digit', day: '2-digit' });
  var isoDate = isoFmt.format(now);
  var filename = 'approach-' + (co || 'brief') + '-' + isoDate + '.html';
  var html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  if (window.APPROACH_DATA) {
    try {
      var dataStr = JSON.stringify(window.APPROACH_DATA).replace(/<\/script>/gi, '<\\/script>');
      html = html.replace(/<script id="approach-data">[\s\S]*?<\/script>/, function() {
        return '<script id="approach-data">\ntry { window.APPROACH_DATA = ' + dataStr + '; } catch(e) { window.APPROACH_DATA = null; }\n<' + '/script>';
      });
    } catch(exportErr) { console.warn('[Approach:Export] data injection failed', exportErr); }
  }
  var blob = new Blob([html], { type: 'text/html' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ── FULLSCREEN ────────────────────────────────────────────────────────────────
function toggleFullscreen() {
  var el = document.documentElement;
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  } else {
    var req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) req.call(el).catch(function(err) { console.warn('[Approach:Fullscreen] blocked —', err && err.message || err); });
  }
}
document.addEventListener('fullscreenchange', function() {
  var btn = document.getElementById('fs-btn');
  if (btn) btn.textContent = document.fullscreenElement ? '← Exit' : '⛶ Fullscreen';
});
document.addEventListener('webkitfullscreenchange', function() {
  var btn = document.getElementById('fs-btn');
  if (btn) btn.textContent = document.webkitFullscreenElement ? '← Exit' : '⛶ Fullscreen';
});
window.toggleExport = toggleExport;
window.closeExport = closeExport;
window.exportHTML = exportHTML;
window.toggleFullscreen = toggleFullscreen;
</script>
</body>
