name = "missionbuilt-mcp"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Bundle skill markdown, HTML template, and CSS asset files as text imports.
[[rules]]
type = "Text"
globs = ["**/*.md", "**/*.html", "**/*.css"]
fallthrough = true

# Bundle raw JS shell assets as text (served verbatim via GET routes).
[[rules]]
type = "Text"
globs = ["**/*.rawjs"]
fallthrough = true

# Durable Objects — required by agents/mcp McpAgent for SSE state.
[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "MissionBuiltMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MissionBuiltMCP"]

# KV namespace for OAuth state (client registrations, auth codes, tokens).
# Create via: npx wrangler kv namespace create OAUTH_KV
# Then paste the returned id below.
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "fb12345f109441aeb933732673ebce93"

# KV namespace for daily Warmup briefs (v0.8+). Stores the latest WARMUP_DATA
# per OAuth-authenticated user at key `warmup:{email}:current`. The artifact
# reads via warmup_get_data on every visibility event for auto-refresh.
# Create via: npx wrangler kv namespace create WARMUP_KV
[[kv_namespaces]]
binding = "WARMUP_KV"
id = "8b49cf6dfb08428ebb5954b30f87bd59"

# Observability — free tier includes this.
[observability]
enabled = true

# Single domain for the unified server.
[[routes]]
pattern = "mcp.missionbuilt.io"
custom_domain = true

# Secrets — set via `npx wrangler secret put <NAME>`:
#   GOOGLE_CLIENT_ID       — from Google Cloud Console OAuth client
#   GOOGLE_CLIENT_SECRET   — from Google Cloud Console OAuth client
#   COOKIE_ENCRYPTION_KEY  — random 32-byte hex string
